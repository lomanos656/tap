<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swine Tap</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.16);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #f472b6;
      --accent-2: #fb7185;
      --success: #22c55e;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(244, 114, 182, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 460px;
      padding: 28px;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 45%);
      pointer-events: none;
      animation: pulseBg 8s ease-in-out infinite;
    }

    .header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 22px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.14);
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 10px auto 0;
      max-width: 320px;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
    }

    .ceo-title {
      margin: 18px auto 0;
      display: inline-block;
      padding: 14px 22px;
      border-radius: 18px;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #fff7cc 0%, #ffe27a 18%, #ffd24d 40%, #ffbf1f 58%, #fff1a6 76%, #b67a00 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.65),
        0 4px 12px rgba(255, 196, 0, 0.28),
        0 10px 24px rgba(0, 0, 0, 0.28);
      position: relative;
      filter: drop-shadow(0 0 12px rgba(255, 204, 51, 0.2));
      animation: goldShine 3.2s linear infinite;
    }

    .ceo-title::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 235, 140, 0.18), rgba(255, 187, 0, 0.05), rgba(255,255,255,0.16));
      z-index: -1;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.2),
        0 10px 24px rgba(255, 191, 31, 0.14);
    }

    .stats {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 24px 0 28px;
    }

    .stat-card {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: clamp(24px, 5vw, 34px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .tap-zone-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 16px 0 24px;
      min-height: 340px;
    }

    .ring {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        inset 0 0 40px rgba(255,255,255,0.05),
        0 0 30px rgba(244, 114, 182, 0.15);
      animation: floatRing 5s ease-in-out infinite;
    }

    .ring::before,
    .ring::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .ring::after {
      inset: 28px;
      border-color: rgba(255,255,255,0.05);
    }

    .tap-button {
      position: relative;
      width: 250px;
      height: 250px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.34), rgba(255,255,255,0.08) 45%, rgba(255,255,255,0.02) 70%),
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        inset 0 8px 22px rgba(255,255,255,0.12),
        inset 0 -12px 22px rgba(0,0,0,0.18),
        0 20px 40px rgba(0,0,0,0.28),
        0 0 36px rgba(244, 114, 182, 0.18);
      transition: transform 0.08s ease, box-shadow 0.2s ease, filter 0.25s ease;
      user-select: none;
      overflow: hidden;
      isolation: isolate;
    }

    .tap-button::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent 35%, transparent 65%, rgba(255,255,255,0.08));
      z-index: 0;
      pointer-events: none;
    }

    .tap-button:hover {
      filter: brightness(1.05);
      box-shadow:
        inset 0 8px 22px rgba(255,255,255,0.14),
        inset 0 -12px 22px rgba(0,0,0,0.2),
        0 26px 44px rgba(0,0,0,0.3),
        0 0 50px rgba(244, 114, 182, 0.24);
    }

    .tap-button:active,
    .tap-button.is-pressed {
      transform: scale(0.95);
      box-shadow:
        inset 0 10px 20px rgba(0,0,0,0.18),
        0 10px 18px rgba(0,0,0,0.2),
        0 0 30px rgba(244, 114, 182, 0.18);
    }

    .tap-button.upgraded {
      box-shadow:
        inset 0 8px 22px rgba(255,255,255,0.14),
        inset 0 -12px 22px rgba(0,0,0,0.22),
        0 24px 48px rgba(0,0,0,0.32),
        0 0 56px rgba(34, 197, 94, 0.26);
    }

    .pig-image {
      position: relative;
      z-index: 1;
      width: 72%;
      height: 72%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.22));
      transition: transform 0.18s ease, filter 0.25s ease, opacity 0.22s ease;
    }

    .tap-button.is-pressed .pig-image {
      transform: scale(0.95) rotate(-2deg);
    }

    .floating-text {
      position: absolute;
      font-weight: 800;
      font-size: 24px;
      color: white;
      text-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      animation: floatUp 900ms ease-out forwards;
      white-space: nowrap;
    }

    .status {
      position: relative;
      z-index: 1;
      text-align: center;
      min-height: 28px;
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 20px;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .status.highlight {
      color: #dcfce7;
      transform: scale(1.02);
    }

    .progress-wrap {
      position: relative;
      z-index: 1;
      margin-bottom: 22px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      overflow: hidden;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.18);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.25s ease, background 0.25s ease;
      box-shadow: 0 0 18px rgba(244,114,182,0.35);
    }

    .progress-fill.done {
      background: linear-gradient(90deg, #22c55e, #4ade80);
      box-shadow: 0 0 22px rgba(34,197,94,0.35);
    }

    .footer-actions {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(1px) scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, rgba(244,114,182,0.28), rgba(251,113,133,0.18));
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.8);
      }
      15% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-90px) scale(1.15);
      }
    }

    @keyframes pulseBg {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.7; }
      50% { transform: scale(1.08) rotate(8deg); opacity: 1; }
    }

    @keyframes floatRing {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-8px) scale(1.01); }
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes goldShine {
      0% {
        filter: drop-shadow(0 0 10px rgba(255, 204, 51, 0.18));
      }
      50% {
        filter: drop-shadow(0 0 18px rgba(255, 214, 102, 0.34));
      }
      100% {
        filter: drop-shadow(0 0 10px rgba(255, 204, 51, 0.18));
      }
    }

    .pop-in {
      animation: popIn 0.35s ease;
    }

    @media (max-width: 520px) {
      .app {
        padding: 22px 16px;
        border-radius: 24px;
      }

      .tap-zone-wrap {
        min-height: 300px;
      }

      .ring {
        width: 280px;
        height: 280px;
      }

      .tap-button {
        width: 220px;
        height: 220px;
      }

      .footer-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="badge">🐷 Tap game</div>
      <h1>Тапай по свину</h1>
      <p class="subtitle">
        Нажимай на круглого свина, набирай тапы и открой новую форму на 50-м нажатии.
      </p>
      <div class="ceo-title">СЕО Никозавр и Димозавр</div>
    </header>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-label">Тапов</div>
        <div class="stat-value" id="tapCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Цель</div>
        <div class="stat-value" id="goalValue">50</div>
      </div>
    </section>

    <div class="tap-zone-wrap" id="tapZoneWrap">
      <div class="ring"></div>
      <button class="tap-button" id="tapButton" aria-label="Тапнуть по свину">
        <img class="pig-image" id="pigImage" src="swin.png" alt="Свин" />
      </button>
    </div>

    <div class="status" id="statusText">Свин готов к тапам 🐽</div>

    <section class="progress-wrap">
      <div class="progress-meta">
        <span>Прогресс до нового свина</span>
        <span id="progressText">0 / 50</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </section>

    <div class="footer-actions">
      <button class="btn btn-primary" id="resetButton">Сбросить счётчик</button>
      <button class="btn" id="vibeButton">Вкл/выкл вибро-эффект</button>
    </div>
  </main>

  <script>
    const GOAL = 50;
    const pigStages = [
      'swin.png',
      'swin2.png',
      'swin3.png',
      'swin4.png',
      'swin5.png',
      'swin6.png',
      'swin7.png',
      'swin8.png',
      'swin9.png',
      'swin10.png'
    ];

    const tapButton = document.getElementById('tapButton');
    const pigImage = document.getElementById('pigImage');
    const tapCountEl = document.getElementById('tapCount');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const statusText = document.getElementById('statusText');
    const resetButton = document.getElementById('resetButton');
    const vibeButton = document.getElementById('vibeButton');
    const tapZoneWrap = document.getElementById('tapZoneWrap');

    let tapCount = 0;
    let currentPigStage = 0;
    let vibrationEnabled = true;

    function updateUI() {
      tapCountEl.textContent = tapCount;

      const maxStage = pigStages.length - 1;
      const unlockedStage = Math.min(Math.floor(tapCount / GOAL), maxStage);

      if (unlockedStage > currentPigStage) {
        currentPigStage = unlockedStage;
        switchPig(currentPigStage);
      }

      const previousThreshold = currentPigStage * GOAL;
      const nextThreshold = (currentPigStage + 1) * GOAL;
      const tapsIntoCurrentStage = tapCount - previousThreshold;
      const progress = currentPigStage >= maxStage
        ? 100
        : Math.min((tapsIntoCurrentStage / GOAL) * 100, 100);

      progressText.textContent = currentPigStage >= maxStage
        ? `${GOAL} / ${GOAL}`
        : `${Math.max(0, Math.min(tapsIntoCurrentStage, GOAL))} / ${GOAL}`;

      progressFill.style.width = `${progress}%`;

      if (currentPigStage >= maxStage) {
        tapButton.classList.add('upgraded');
        progressFill.classList.add('done');
        statusText.textContent = 'Ты открыл всех свинов! Продолжай тапать 👑';
        statusText.classList.add('highlight');
      } else {
        const tapsLeft = Math.max(nextThreshold - tapCount, 0);
        tapButton.classList.toggle('upgraded', currentPigStage > 0);
        progressFill.classList.remove('done');
        statusText.textContent = `До следующего свина осталось: ${tapsLeft}`;
        statusText.classList.toggle('highlight', currentPigStage > 0);
      }
    }

    function switchPig(stageIndex) {
      pigImage.style.opacity = '0';
      pigImage.style.transform = 'scale(0.86) rotate(-8deg)';

      setTimeout(() => {
        pigImage.src = pigStages[stageIndex];
        pigImage.alt = `Свин ${stageIndex + 1}`;
        pigImage.style.opacity = '1';
        pigImage.style.transform = 'scale(1.04) rotate(3deg)';
        pigImage.classList.remove('pop-in');
        void pigImage.offsetWidth;
        pigImage.classList.add('pop-in');

        setTimeout(() => {
          pigImage.style.transform = '';
        }, 240);
      }, 180);
    }

    function maybeVibrate() {
      if (!vibrationEnabled) return;
      if (navigator.vibrate) {
        navigator.vibrate(20);
      }
    }

    function createFloatingText(x, y, text = '+1') {
      const el = document.createElement('div');
      el.className = 'floating-text';
      el.textContent = text;

      const rect = tapZoneWrap.getBoundingClientRect();
      el.style.left = `${x - rect.left}px`;
      el.style.top = `${y - rect.top}px`;

      tapZoneWrap.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }

    function tapPig(clientX, clientY) {
      tapCount += 1;
      updateUI();
      maybeVibrate();

      tapButton.classList.remove('is-pressed');
      void tapButton.offsetWidth;
      tapButton.classList.add('is-pressed');
      setTimeout(() => tapButton.classList.remove('is-pressed'), 90);

      createFloatingText(clientX, clientY, currentPigStage > 0 ? '+1 ✨' : '+1');

      if (tapCount > 0 && tapCount % GOAL === 0) {
        createFloatingText(clientX, clientY - 25, `SWIN ${currentPigStage + 1}!`);
      }
    }

    tapButton.addEventListener('click', (e) => {
      tapPig(e.clientX, e.clientY);
    });

    tapButton.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      if (!touch) return;
      tapButton.classList.add('is-pressed');
      createFloatingText(touch.clientX, touch.clientY, currentPigStage > 0 ? '+1 ✨' : '+1');
    }, { passive: true });

    tapButton.addEventListener('touchend', () => {
      tapButton.classList.remove('is-pressed');
    }, { passive: true });

    resetButton.addEventListener('click', () => {
      tapCount = 0;
      currentPigStage = 0;
      pigImage.src = pigStages[0];
      pigImage.alt = 'Свин 1';
      tapButton.classList.remove('upgraded');
      progressFill.classList.remove('done');
      statusText.textContent = 'Свин готов к тапам 🐽';
      statusText.classList.remove('highlight');
      updateUI();
    });

    vibeButton.addEventListener('click', () => {
      vibrationEnabled = !vibrationEnabled;
      vibeButton.textContent = vibrationEnabled
        ? 'Вкл/выкл вибро-эффект'
        : 'Вибро-эффект выключен';
    });

    updateUI();
  </script>
</body>
</html>
